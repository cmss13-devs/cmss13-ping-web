<!DOCTYPE html>
<html>
    <head>
        <style>
            html {
                font-family: monospace;
            }

            #output {
                display: flex;
                flex-wrap: wrap;

                gap: 20px;
            }
        </style>
        <script>
            const relays = ["uk", "eu-e", "eu-w", "aus", "us-e", "us-w", "asia-se"]

            const runCheck = async (server, port, display) => {
                return new Promise((resolve) => {

                    const divElement = document.createElement("div");
                    const h3 = document.createElement("h3");
                    const link = document.createElement("a");
                    const child = document.createElement("p");

                    link.href = `byond://${server}:${display}`;
                    link.textContent = `byond://${server}:${display}`;

                    child.textContent = "Pinging..."

                    h3.appendChild(link);
                    divElement.appendChild(h3);
                    divElement.appendChild(child);

                    document.getElementById("output").appendChild(divElement);

                    const socket = new WebSocket(`wss://${server}:${port}`);

                    const pingsSent = {};
                    const pingTimes = [];

                    socket.addEventListener('message', (event) => {
                        pingTimes.push(Date.now() - pingsSent[event.data]);

                        ping(Number(event.data) + 1);
                    })

                    socket.addEventListener('open', () => {
                        ping(1);
                    })

                    socket.addEventListener('error', (event) => console.log(event))

                    const ping = (iter) => {
                        if(pingTimes.length) {
                            child.innerHTML = `avg: ${Math.round(pingTimes.reduce((a, b) => a + b) / pingTimes.length * 100) / 100}ms<br> min: ${Math.min(...pingTimes)}ms<br> max ${Math.max(...pingTimes)}ms`
                        };

                        pingsSent[String(iter)] = Date.now()
                        socket.send(iter);
                    }
                });

            }

            const main = async () => {
                runCheck("direct.cm-ss13.com", 4000, 3000)
                for (const server of relays) {
                    runCheck(`${server}.cm-ss13.com`, 4000, 3000);
                    runCheck(`${server}.cm-ss13.com`, 40000, 30000);
                };
            }
        </script>
    </head>
    <body>
        <h1 style="text-decoration: underline;">CM-SS13 Relays</h1>

        <p id="output"></p>
        <script>main()</script>
    </body>
</html>
